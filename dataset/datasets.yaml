"""
dataset split information, following the paper:
  Dynamic Context-Sensitive Filtering Network for Video Salient Object Detection, ICCV 2021,  
  code link: https://github.com/Roudgers/DCFNet

But you probably do not need that, the list files are already here in ./dataset
List files were created via running generate_data_lst.py
"""


DUTS-TR:
    image_dir: sod/DUTS-TR/images
    label_dir: sod/DUTS-TR/GT
    image_ext: .jpg
    label_ext: .png


# DAVSOD Dataset
DAVSOD:
    image_dir: Imgs
    label_dir: GT_object_level
    image_ext: .png
    label_ext: .png
    video_split:
        train: vsod/DAVSOD_Training_Set
        val: vsod/DAVSOD_Validation_Set
        test: vsod/DAVSOD_Test_Set_Easy_35

